name: spell-run

on:
  workflow_dispatch:
    inputs:
      payload:
        description: 'Spell JSON input'
        required: false
        default: '{}'
  repository_dispatch:
    types: [spell.cast]

jobs:
  run:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Resolve payload
        id: payload
        run: |
          if [ -n "${{ github.event.inputs.payload }}" ]; then
            echo "payload=${{ github.event.inputs.payload }}" >> $GITHUB_OUTPUT
          else
            echo "payload=${{ toJson(github.event.client_payload) }}" >> $GITHUB_OUTPUT
          fi

      - name: Simulate spell execution
        run: |
          echo "Running spell with payload: ${{ steps.payload.outputs.payload }}" | tee out.log
          mkdir -p out
          echo "{\"ok\":true,\"ts\":\"$(date -Iseconds)\"}" > out/result.json
          zip -j out/result.zip out/result.json out.log

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: out/result.zip

