name = "spell-edge-js"
main = "src/worker.ts"
compatibility_date = "2025-08-01"



kv_namespaces = [
  { binding = "KV", id = "6cb04152adbe45ffa40a257859f89f82" }
]

r2_buckets = [
  { binding = "R2", bucket_name = "spell-artifacts" }
]

routes = [
  { pattern = "koichinishizuka.com/api/*", zone_name = "koichinishizuka.com" }
]

[vars]
# 固定で良いものだけ。秘密は wrangler secret で。
R2_BUCKET = "spell-artifacts"
R2_PUBLIC_BASE_URL = "https://dl.koichinishizuka.com"
JWT_AUDIENCE = "https://koichinishizuka.com"
JWT_ISSUER = "https://koichinishizuka.com"
CORS_ALLOW_ORIGIN = "https://koichinishizuka.com"
DEFAULT_TENANT_ID = "1"
CAP_KV_PREFIX = "cap"
AUDIT_R2_PREFIX = "audit"
ARTIFACT_TTL_DAYS = "7"
ARTIFACT_EXTEND_COST_CENTS = "0"
ARTIFACT_EXTEND_MAX_DAYS = "30"
DEFAULT_TENANT_CAP_CENTS = "1000"
DEFAULT_SPELL_ESTIMATE_CENTS = "25"
GITHUB_APP_ID = "1939757"
GITHUB_API_BASE = "https://api.github.com"
